<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e40af" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
  </defs>
  <!-- Background Card -->
  <rect width="512" height="512" rx="128" fill="url(#bg-grad)" />
  
  <!-- Flow lines -->
  <path d="M 120 180 Q 256 120 392 180" fill="none" stroke="rgba(255, 255, 255, 0.1)" stroke-width="24" stroke-linecap="round" />
  <path d="M 120 332 Q 256 392 392 332" fill="none" stroke="rgba(255, 255, 255, 0.1)" stroke-width="24" stroke-linecap="round" />

  <!-- Fluid Arrow/Checkmark Checkmark (L + F motif) -->
  <g transform="translate(4, 8)">
    <!-- First layer / Shadow -->
    <path d="M 160 260 L 220 320 L 360 180" fill="none" stroke="#000000" stroke-width="54" stroke-linecap="round" stroke-linejoin="round" opacity="0.3" transform="translate(0, 8)" />
    <!-- White core L-line -->
    <path d="M 160 260 L 220 320" fill="none" stroke="#ffffff" stroke-width="48" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Gradient check F-line -->
    <path d="M 220 320 L 360 180" fill="none" stroke="url(#logo-grad)" stroke-width="48" stroke-linecap="round" stroke-linejoin="round" />
  </g>
  
  <!-- Dot indicator -->
  <circle cx="364" cy="188" r="16" fill="#38bdf8" />
</svg>
